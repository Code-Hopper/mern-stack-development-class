<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* :root {} */

        html {
            font-size: 10px;
            /* 1rem = 10px */
        }

        .i1 {
            width: 300px;
            height: 300px;
            border: 1px solid black;
            font-size: 20px;
            /* 1em = 20px */
        }

        .i2 {
            width: 300px;
            height: 300px;
            border: 1px solid red;
            /* 1em = 16px */
        }

        span {
            display: block;
            /* width: 100vw !important; */
            /* background-color: red; */
            /* text-align: center; */
            /* start end center */
            /* text-decoration: dashed;
            text-transform: italize;
            text-wrap: none; */

            font-family: sans-serif;
            font-weight: bolder;
            /* thin normal bold bolder */
            font-style: italic;
            /* italic and normal */
            font-size: 2rem;
            /* 2 * 10px = 20px */
            /* 2 * 20px = 40px */
        }

        /* 32px */

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="i1">
        <span>some data here</span>
        <a href="">click here</a>
    </div>

    <div class="i2">
        <span>some data here</span>
        <a href="">click here</a>
    </div>
</body>

</html>

<!-- 1em = 1rem = 16px -->
