<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .parent {
            width: 616px;
            height: 616px;
            border: 1px solid black;
            margin: 10rem auto;
            display: grid;
            grid-template-columns: 200px 200px 200px;
            grid-template-rows: 200px 200px 200px;
            gap: .5rem;
            justify-items: stretch;
            align-items: stretch;
            /* start end center stretch */
        }

        .child {
            background-color: red;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            /* width: 100px;
            height: 100px; */
        }

        .child1 {
            grid-column: 1 / 3;
        }
    </style>

</head>

<body>
    <div class="parent">
        <div class="child child1">child1</div>
        <div class="child child2">child2</div>
        <div class="child child3">child3</div>
        <div class="child child4">child4</div>
        <div class="child child5">child5</div>
        <div class="child child6">child6</div>
        <div class="child child7">child7</div>
        <!-- <div class="child child8">child8</div>
        <div class="child child9">child9</div> -->
    </div>
</body>

</html>
