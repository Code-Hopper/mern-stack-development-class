<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 300vh;
        }

        #i1 {
            width: 500px;
            height: 500px;
            
            color: white;

            /* background property */
            /* 
            background-color: black;
            background-image: url("./smile.png");
            background-size: auto;
            /* auto(default) contain() cover */
            /* background-repeat: no-repeat; */
            /* repeat(default) no-repeat repeat-x repeat-y */
            /* background-position: center center; */
            /* left right top bottom center  */
            /* background-attachment: fixed; */
            /* scroll(default) fixed */

            /* background: black, url(), cover; */
            /* background shorthand property */

            /* gradients */

            /* linear-gradient */
            /* radial-gradient */
            /* conic-gradient */

            /* background: linear-gradient(red,blue,green, yellow); */

            /* background: linear-gradient(135deg,red 50%,blue 50%); */

            /* linear-gradient(angle, color1 composition, color2,....,color n) */

            /* background: conic-gradient(red 70%, blue 30%); */

            /* background: radial-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.75)), url("./image.jpg"); */

            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 1)), url("./image.jpg");

            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

    </style>
</head>

<body>
    <div id="i1">
        <h2 id="i1h2">Business Meeting</h2>
    </div>
</body>

</html>
