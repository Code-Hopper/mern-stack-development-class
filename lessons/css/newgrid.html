<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .parent {
            width: 600px;
            height: 400px;
            /* border: 1px solid black; */
            margin: auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 0.25rem;
        }

        .child {
            background-color: red;
        }

        .child-1 {
            /* grid-column: 1/2; */
            grid-row: 1 / 4;
            background-color: #72c055;
        }

        .child-2 {
            grid-column: 2 / 4;
            grid-row: 1/2;
            background-color: #72c055;
        }

        .child-3 {
            background-color: #ed3a3d;
        }

        .child-4 {
            background-color: #fbb436;
        }

        .child-5 {
            background-color: #ed3a3d;
        }

        .child-6 {
            grid-column: 4 / 5;
            grid-row: 2 / 4;
            background-color: #72c055;
        }

        .child-7 {
            background-color: #ed3a3d;
        }

        .child-8 {
            background-color: #fbb436;
        }

        .parent2{
            width: 500px;
            height: 500px;
            border: 1px solid black;
            margin: 3rem auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .red{
            background-color: rgba(255,0,0,.5);
            grid-column: 1 / 3;
            grid-row: 1 / 3;
        }

        .blue{
            grid-column: 1 / 3;
            grid-row: 1 / 3;
            background-color: rgba(0,0,255,.5);
        }

    </style>

</head>

<body>
    <div class="parent">
        <div class="child child-1"></div>
        <div class="child child-2"></div>
        <div class="child child-3"></div>
        <div class="child child-4"></div>
        <div class="child child-5"></div>
        <div class="child child-6"></div>
        <div class="child child-7"></div>
        <div class="child child-8"></div>
    </div>

    <div class="parent2">
        <div class="red"></div>
        <div class="blue"></div>
    </div>

</body>

</html>
