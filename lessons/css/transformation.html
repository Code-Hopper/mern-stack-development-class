<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            perspective: 500px;
        }

        .element1 {
            width: 10rem;
            height: 10rem;
            background-color: red;
            position: relative;
            /* transform: translateX(5rem) translateY(5rem); */
            transform: translate(5rem, 5rem) rotateX(40deg) rotateY(20deg);

            /* translateX, translateY, translateZ */

            /* translate() */
            /* scaleX() scaleY() scale(XY) scale(X,Y) */
            /* scale() */
            /* rotate() */
            /* rotateX() rotateY() rotate() */
            /* skew() */
        }

        .child1 {
            width: 3rem;
            height: 3rem;
            background-color: rgba(0,0,255,.5);
            position: absolute;
            left: 100%;
            top: 0;
            transform: translate(-50%,-50%) scale(2,.5);
        }

        /* transformation */
        /* scale, shape, position, angles */
        /* 2 D [X Y] | 3 D [X Y Z] */

        .element2{
            width: 5rem;
            height: 5rem;
            background-color: black;
            transform: skew(30deg);
        }

    </style>
</head>

<body>
    <div class="element1">
        <div class="child1"></div>
    </div>
    <div class="element2"></div>
</body>

</html>
