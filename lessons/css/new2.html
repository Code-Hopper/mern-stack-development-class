<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .element1 {
            width: 100px;
            height: 100px;
            position: relative;
            left: 0;
            background-color: blue;
            margin-top: 2rem;
            font-size: 2rem;
            color: white;
          
            transition-property: all;
            transition-duration: 0.5s;
            transition-timing-function: linear;
            
        }

        .element1:hover{
            transform: scale(2);
            border-radius: 100%;
        }

        .element1.linear {
            animation-name: move;
            animation-duration: 10s;
            animation-delay: 0s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        .element1.ease-in {
            animation-name: move;
            animation-duration: 10s;
            animation-delay: 0s;
            animation-timing-function: ease-in;
            animation-iteration-count: infinite;
        }

        .element1.ease-out {
            animation-name: move;
            animation-duration: 10s;
            animation-delay: 0s;
            animation-timing-function: ease-out;
            animation-iteration-count: infinite;
        }

        .element1.ease-in-out {
            animation-name: move;
            animation-duration: 10s;
            animation-delay: 0s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        .element1.steps {
            animation-name: move;
            animation-duration: 10s;
            animation-delay: 0s;
            animation-timing-function: steps(10);
            animation-iteration-count: infinite;
        }

        .element1.custom {
            animation-name: move;
            animation-duration: 10s;
            animation-delay: 0s;
            animation-timing-function: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation-iteration-count: infinite;
        }

        @keyframes move {
            0% {
                left: 0;
            }

            50% {
                left: 100%;
            }

            100% {
                left: 0;
            }
        }

        @keyframes ani1 {
            0% {
                background-color: red;
            }

            10% {
                background-color: aqua;
            }

            20% {
                background-color: black;
            }

            30% {
                background-color: brown;
            }

            40% {
                background-color: yellow;
            }

            50% {
                background-color: green;
            }

            60% {
                background-color: red;
            }

            100% {
                background-color: blue;
            }
        }
    </style>
</head>

<body>

    <div class="element1"></div>

    <div class="element1 linear">linear</div>
    <div class="element1 ease-in">ease-in</div>
    <div class="element1 ease-out">ease-out</div>
    <div class="element1 ease-in-out">ease-in-out</div>
    <div class="element1 steps">steps</div>
    <div class="element1 custom">custom</div>
</body>

</html>
