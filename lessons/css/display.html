<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* display property */

        /* how an elemennt will apear along with the other elements */
        /* in the same line */
        /* in the new line */

        /* display: none/ inline/ block/ inline-block/ flex(1D)/ grid(2D);*/

        /* layout */

        #i1 {
            width: 300px;
            height: 300px;
            background-color: red;
            display: inline-block;
        }

        /* inline -> continues in the same line but does not supports external height and width */

        /* block -> will not be in the same line but supports external height and width */

        /* inline-block -> will allow elements to be in the same line and also support external height and width */

        #i2 {
            width: 300px;
            height: 300px;
            background-color: green;
            display: inline-block;
        }
    </style>

</head>

<body>
    <div id="i1">
        <span>red</span>
    </div>
    <div id="i2">
        <span>green</span>
    </div>
</body>

</html>
